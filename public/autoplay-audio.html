<!DOCTYPE html>
<html>
<body>
<audio id="a" src="/competitive-bg.mp3" loop preload="auto" autoplay></audio>
<script>
  var a = document.getElementById('a');
  var playing = false;

  function tryPlay() {
    if (playing && !a.paused) return;
    a.play().then(function() { playing = true; }).catch(function(){});
  }

  // Try immediately
  tryPlay();

  // Try Web Audio API
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var src = ctx.createMediaElementSource(a);
    src.connect(ctx.destination);
    if (ctx.state === 'suspended') ctx.resume();
    tryPlay();
  } catch(e) {}

  // Retry periodically
  setInterval(tryPlay, 500);

  // Listen for play message from parent
  window.addEventListener('message', function(e) {
    if (e.data === 'play') tryPlay();
  });

  // Keep playing if paused
  a.addEventListener('pause', function() { a.play().catch(function(){}); });
</script>
</body>
</html>
